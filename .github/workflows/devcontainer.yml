name: Devcontainer CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  devcontainer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # 1) Checkout your code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2) Cache Cargo registry & Git index
      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # 3) Cache npm cache
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # 4) Setup Docker Buildx with caching backend
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          buildkitd-flags: --debug

      # 5) Cache Docker layers (local)
      - name: Restore Docker layer cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # 6) Build & push image with Buildx + inline/local cache
      - name: Build Devcontainer image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: .devcontainer/Dockerfile.dev
          tags: devcontainer-ci:latest
          builder: default
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      # 7) Run init & CI commands inside container
      - name: Run init & tests
        run: |
          docker run --rm -i \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace \
            devcontainer-ci:latest \
            bash -lc "\
              .devcontainer/init.sh create && \
              .devcontainer/init.sh start && \
              cargo fmt -- --check && \
              cargo clippy -- -D warnings && \
              cargo test\
            "

      # 8) Save updated Docker cache
      - name: Save Docker layer cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
