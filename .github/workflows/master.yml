name: master

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Enable Cargo cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all -- -D warnings

      - name: Build
        run: cargo build --all --verbose

      - name: Run tests
        run: cargo test --all --verbose

      - name: Check that the benchmarks can still compile
        run: cargo bench --no-run

      - name: Generate documentation
        run: cargo doc --all --verbose

      - name: Dry-run publish
        run: cargo publish --allow-dirty --dry-run

  devcontainer-ci:
    name: Build & Test Devcontainer
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Optional: enable QEMU for cross-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # Create and use a Buildx builder with docker-container driver
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver: docker-container
          buildkitd-flags: --debug
          driver-opts: image=moby/buildkit:latest
          install: true

      - name: Create builder instance
        run: |
          docker buildx create --name builder --use --driver docker-container \
            --driver-opt image=moby/buildkit:latest || true

      - name: Cache Buildx layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('.devcontainer/Dockerfile.dev') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Devcontainer image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: .devcontainer/Dockerfile.dev
          builder: builder
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          tags: devcontainer-ci:latest

      - name: Run init & smoke-tests inside container
        run: |
          docker run --rm -i \
            -v "${{ github.workspace }}":/workspace \
            -w /workspace \
            --entrypoint bash \
            devcontainer-ci:latest \
            -lc "\
              .devcontainer/init.sh create && \
              .devcontainer/init.sh start && \
              cargo fmt -- --check && \
              cargo clippy -- -D warnings && \
              cargo test\
            "