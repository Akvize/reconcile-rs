# kustomize overlay for running reconcile-rs locally in kind.
#
# It REUSES the production manifests in ../base/ unchanged and only patches the two things that
# differ for a local cluster:
#   1. the image — swap the registry image for the one we build and `kind load` locally;
#   2. the replica count — 5 pods, to make peer discovery and propagation more visible.
#
# Apply it with:  kubectl apply -k examples/k8s/kind   (or just run ./up.sh, which does everything).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The base: the same manifests you'd deploy to a real cluster. We do NOT include
# secret.example.yaml — the cluster key is generated and applied separately by up.sh, so a real
# key never lands in a committed file.
resources:
  - ../base/service.yaml
  - ../base/configmap.yaml
  - ../base/statefulset.yaml

# Point every reference to the production image at the locally-built, kind-loaded image instead.
# kustomize matches on the name part (before the tag), so this rewrites
# `ghcr.io/akvize/reconcile:latest` -> `reconcile:kind`.
images:
  - name: ghcr.io/akvize/reconcile
    newName: reconcile
    newTag: kind

# Five pods instead of the base's three.
replicas:
  - name: reconcile
    count: 5

patches:
  - target:
      kind: StatefulSet
      name: reconcile
    patch: |
      # Never try to pull from a registry: the image only exists inside kind because we loaded it
      # there. If you forget the `kind load` step you'll get a clear `ErrImageNeverPull`, which is a
      # useful thing to recognise while learning.
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
