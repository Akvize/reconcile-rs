# A StatefulSet gives each pod a stable name (reconcile-0, reconcile-1, …) and stable DNS, from
# which `k8s_node` derives a stable node id for the HLC tie-break. Peers are discovered purely via
# the headless Service DNS — no Kubernetes API access or RBAC is required.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: reconcile
  labels:
    app: reconcile
spec:
  serviceName: reconcile-headless # must match the headless Service for stable pod DNS
  replicas: 3
  selector:
    matchLabels:
      app: reconcile
  template:
    metadata:
      labels:
        app: reconcile
    spec:
      # Give pods a moment to deregister from the Service DNS on shutdown.
      terminationGracePeriodSeconds: 15
      containers:
        - name: reconcile
          # Replace with your built image (see ../Dockerfile).
          image: ghcr.io/akvize/reconcile:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: reconcile-config
          env:
            # Downward API: bind to the pod IP and derive identity from the pod name.
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Shared cluster key from the Secret (see secret.example.yaml).
            - name: RECONCILE_CLUSTER_KEY
              valueFrom:
                secretKeyRef:
                  name: reconcile-secret
                  key: cluster-key
          ports:
            - name: gossip
              containerPort: 8080
              protocol: UDP
            - name: metrics
              containerPort: 9000
              protocol: TCP
            - name: ready
              containerPort: 9001
              protocol: TCP
          # Readiness gates the pod into the headless-Service DNS (and thus into peers'
          # DnsDiscovery). It MUST reflect real store health, not just "an HTTP port is open":
          # /metrics is the in-process Prometheus listener and comes up before ReconcileStore::new
          # binds the UDP socket, so probing it would advertise a pod that cannot yet serve a single
          # reconciliation. The dedicated /ready endpoint returns 200 only once the store is built
          # and its gossip loop is running. (This is join-time health; the discovery decommission
          # floor of issue #201 governs leave-time grace — the two are independent.)
          readinessProbe:
            httpGet:
              path: /ready
              port: ready
            initialDelaySeconds: 3
            periodSeconds: 5
          # Liveness only checks the process is alive and serving HTTP, so /metrics is fine here.
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
